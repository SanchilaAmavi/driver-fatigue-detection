name: nexdrive
description: NexDrive driver fatigue detection mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Voice
  speech_to_text: ^7.4.0
  flutter_tts: ^4.2.0

  # Camera & ML
  camera: ^0.10.5+9
  google_mlkit_face_detection: ^0.11.0

  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0

  # HTTP
  http: ^1.2.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Location
  geolocator: ^11.0.0

  # Maps
  google_maps_flutter: ^2.9.0

  # Utils
  url_launcher: ^6.2.4
  shared_preferences: ^2.2.2
  fl_chart: ^0.67.0
  intl: ^0.19.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true